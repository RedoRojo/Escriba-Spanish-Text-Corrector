<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corrector de Español</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"DM Serif Display"', 'serif'],
            body: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            paper: '#F7F5F0',
            ink: '#1C1917',
            'ink-fade': '#6B7280',
            error: '#DC2626',
            'error-bg': '#FEF2F2',
            correct: '#059669',
            'correct-bg': '#ECFDF5',
            badge: '#7C3AED',
            'badge-bg': '#F5F3FF',
            rule: '#E5E7EB',
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #F7F5F0;
      color: #1C1917;
      -webkit-font-smoothing: antialiased;
    }

    .text-display { font-family: '"DM Serif Display"', serif; }

    .error-highlight {
      background: #FEF2F2;
      color: #DC2626;
      border-bottom: 2px solid #DC2626;
      cursor: pointer;
      border-radius: 2px;
      padding: 1px 0;
      transition: background 0.15s;
      position: relative;
    }
    .error-highlight:hover {
      background: #FEE2E2;
    }
    .error-highlight.active {
      background: #FEE2E2;
      box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.3);
    }
    .error-highlight.accepted {
      background: #ECFDF5;
      color: #059669;
      border-bottom-color: #059669;
    }
    .error-highlight.ignored {
      background: transparent;
      color: inherit;
      border-bottom-color: #D1D5DB;
      cursor: default;
    }

    #error-popover {
      position: absolute;
      z-index: 50;
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      padding: 16px;
      width: 340px;
      font-size: 0.875rem;
      display: none;
      top: 0;
      left: 0;
    }
    #error-popover.show { display: block; }

    #error-popover::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 24px;
      width: 10px;
      height: 10px;
      background: #fff;
      border-left: 1px solid #E5E7EB;
      border-top: 1px solid #E5E7EB;
      transform: rotate(45deg);
    }

    .popover-line {
      position: absolute;
      background: #7C3AED;
      width: 2px;
      transition: top 0.2s, height 0.2s;
    }

    .btn-primary {
      background: #7C3AED;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #6D28D9; }
    .btn-ghost {
      background: transparent;
      color: #6B7280;
      border: 1px solid #E5E7EB;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-ghost:hover { background: #F9FAFB; color: #1C1917; }

    .btn-primary:disabled, .btn-ghost:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 640px) {
      #error-popover { width: calc(100vw - 32px); left: 16px !important; }
    }
  </style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✎</text></svg>" />
</head>
<body class="min-h-screen flex flex-col">

  <header class="border-b border-rule bg-white">
    <div class="max-w-3xl mx-auto px-5 py-6">
      <h1 class="text-2xl sm:text-3xl font-display text-ink tracking-tight">Corrector de Español</h1>
      <p class="text-ink-fade text-sm mt-1.5">Pega tu texto, revisa los errores en línea y decide qué corregir.</p>
    </div>
  </header>

  <main class="flex-1 max-w-3xl mx-auto w-full px-5 py-8 space-y-6">

    <!-- Input section -->
    <section id="input-section" class="bg-white rounded-xl border border-rule p-5">
      <label for="text-input" class="block text-sm font-medium text-ink mb-2">Texto a analizar</label>
      <textarea
        id="text-input"
        rows="6"
        class="w-full border border-rule rounded-lg p-4 text-sm leading-relaxed font-body resize-y outline-none focus:border-accent focus:ring-1 focus:ring-accent transition"
        placeholder="Escribe o pega aquí tu texto en español..."
      ></textarea>
      <div class="flex items-center justify-between mt-2.5">
        <span id="counter" class="text-xs text-ink-fade">0 caracteres</span>
        <span id="error-message" class="text-xs text-error hidden"></span>
      </div>
      <button
        id="analyze-btn"
        class="mt-4 w-full sm:w-auto px-6 py-2.5 bg-ink text-white text-sm font-medium rounded-lg hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed transition"
      >
        Analizar
      </button>
    </section>

    <!-- Loading -->
    <div id="loading" class="hidden text-center py-12">
      <div class="inline-block w-7 h-7 border-2 border-ink-fade border-t-ink rounded-full animate-spin"></div>
      <p class="text-ink-fade text-sm mt-3">Analizando texto…</p>
    </div>

    <!-- Results section -->
    <section id="results-section" class="hidden space-y-4">
      <!-- Progress -->
      <div id="progress-bar" class="flex items-center gap-3 text-sm text-ink-fade">
        <span id="progress-label">0 / 0 errores revisados</span>
        <div class="flex-1 h-1.5 bg-rule rounded-full overflow-hidden">
          <div id="progress-fill" class="h-full bg-correct rounded-full transition-all" style="width:0%"></div>
        </div>
      </div>

      <!-- Manuscript area -->
      <div id="manuscript" class="bg-white rounded-xl border border-rule p-6 sm:p-8 relative">
        <div id="text-content" class="text-base leading-8 text-ink font-body whitespace-pre-wrap"></div>
        <!-- Popover container (positioned absolutely) -->
        <div id="error-popover">
          <div class="flex items-center justify-between mb-2">
            <span id="popover-type" class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium bg-badge-bg text-badge"></span>
            <span id="popover-err-num" class="text-[11px] text-ink-fade"></span>
          </div>
          <div class="space-y-2 text-sm">
            <div>
              <span class="text-ink-fade text-[11px] uppercase tracking-wider">Original</span>
              <p id="popover-original" class="font-mono text-error line-through text-sm"></p>
            </div>
            <div>
              <span class="text-ink-fade text-[11px] uppercase tracking-wider">Sugerencia</span>
              <p id="popover-correction" class="font-mono text-correct font-medium text-sm"></p>
            </div>
            <p id="popover-explanation" class="text-ink-fade text-xs leading-relaxed pt-1 border-t border-rule"></p>
          </div>
          <div class="flex items-center gap-2 mt-4">
            <button id="popover-accept" class="btn-primary">Aceptar</button>
            <button id="popover-ignore" class="btn-ghost">Ignorar</button>
          </div>
        </div>
      </div>

      <!-- Final text after all decisions -->
      <div id="final-section" class="hidden bg-white rounded-xl border border-rule p-6 sm:p-8">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-medium text-ink">Texto final</h2>
          <button id="copy-btn" class="text-xs text-ink-fade border border-rule px-3 py-1.5 rounded-lg hover:bg-gray-50 transition">Copiar</button>
        </div>
        <div id="final-text" class="text-sm text-ink leading-relaxed whitespace-pre-wrap"></div>
      </div>
    </section>

    <!-- Empty state -->
    <section id="empty-state" class="text-center py-16 text-ink-fade">
      <p class="text-sm">Pega tu texto y presiona <span class="font-medium text-ink">Analizar</span> para comenzar.</p>
    </section>
  </main>

  <footer class="border-t border-rule bg-white mt-8">
    <div class="max-w-3xl mx-auto px-5 py-4 text-center text-[11px] text-ink-fade">
      Corrector de Español &mdash; Proyecto de portafolio
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
